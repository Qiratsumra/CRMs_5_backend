version: "3.9"

# PostgreSQL is Neon DB (cloud-hosted). No local postgres container needed.
# DATABASE_URL is read from .env automatically via env_file.

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - fte-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - fte-network

  api:
    build: .
    command: uv run uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      WHATSAPP_MCP_SERVER_PATH: /whatsapp-mcp/whatsapp-mcp-server
    depends_on:
      - kafka
    volumes:
      - .:/app
      - ../whatsapp-mcp:/whatsapp-mcp
    networks:
      - fte-network
    restart: unless-stopped

  worker:
    build: .
    command: uv run python workers/message_processor.py
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      WHATSAPP_MCP_SERVER_PATH: /whatsapp-mcp/whatsapp-mcp-server
    depends_on:
      - kafka
    volumes:
      - .:/app
      - ../whatsapp-mcp:/whatsapp-mcp
    networks:
      - fte-network
    restart: unless-stopped
    deploy:
      replicas: 2

  # EXACTLY 1 REPLICA — prevents duplicate message processing
  whatsapp-poller:
    build: .
    command: uv run python workers/whatsapp_poller.py
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      WHATSAPP_MCP_SERVER_PATH: /whatsapp-mcp/whatsapp-mcp-server
    depends_on:
      - kafka
    volumes:
      - .:/app
      - ../whatsapp-mcp:/whatsapp-mcp
    networks:
      - fte-network
    restart: unless-stopped

networks:
  fte-network:
    driver: bridge
